name: CI — Build & Test

on:
  push:
    branches: [ dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  build:
    name: Build & Unit Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: logistics_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and test
        env:
          DB_URL: jdbc:postgresql://localhost:5432/logistics_db
          DB_USERNAME: postgres
          DB_PASSWORD: postgres
          JWT_SECRET: Y2kteW91ci10ZXN0LXNlY3JldC1rZXktZm9yLWNpLXBpcGVsaW5lLXVzZS1vbmx5
        run: mvn clean test --no-transfer-progress

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: target/surefire-reports/
